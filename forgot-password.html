<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="forget.css">
</head>
<body>
<div class="form-container">
    <h1>Reset Password</h1>

    <!-- Step 1: Request OTP -->
    <form id="requestOtpForm">
        <label for="email">E-mail:</label>
        <input type="email" id="email" placeholder="E-mail" required>
        <input type="submit" value="Send OTP">
    </form>

    <!-- Step 2: Verify OTP -->
    <form id="verifyOtpForm" style="display:none;">
        <label for="otp">OTP:</label>
        <input type="number" id="otp" placeholder="Enter OTP" required>
        <input type="submit" value="Verify OTP">
    </form>

    <!-- Step 3: Update Password -->
    <form id="updatePasswordForm" style="display:none;">
        <label for="newPassword">New Password:</label>
        <input type="password" id="newPassword" placeholder="New Password" required>
        <input type="submit" value="Reset Password">
    </form>

    <div class="form-links">
        <a href="login.html" id="login2">Login?</a>
    </div>

    <p id="message" style="color:red;"></p>
</div>

<script>
const requestOtpForm = document.getElementById('requestOtpForm');
const verifyOtpForm = document.getElementById('verifyOtpForm');
const updatePasswordForm = document.getElementById('updatePasswordForm');
const message = document.getElementById('message');

let currentEmail = '';

function addCsrfToken(form, token) {
    const input = document.createElement("input");
    input.type = "hidden";
    input.name = "csrf_token";
    input.value = token;
    form.appendChild(input);
}

// CSRF token for all forms
const csrfToken = "abc123";
addCsrfToken(requestOtpForm, csrfToken);
addCsrfToken(verifyOtpForm, csrfToken);
addCsrfToken(updatePasswordForm, csrfToken);

requestOtpForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    message.textContent = '';
    const email = document.getElementById('email').value.trim();
    if (!email) return;
    currentEmail = email;

    message.style.color = 'black';
    message.textContent = 'Sending OTP...';
    try {
        const res = await fetch('/api/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, csrf_token: csrfToken })
        });
        const data = await res.json();
        if (data.success) {
            requestOtpForm.style.display = 'none';
            verifyOtpForm.style.display = 'block';
            message.style.color = 'green';
            message.textContent = 'OTP sent to your email';
            document.getElementById('login2').style.display = 'none';
        } else {
            message.style.color = 'red';
            message.textContent = data.error || 'Failed to send OTP';
        }
    } catch (err) {
        message.style.color = 'red';
        message.textContent = 'Server error';
    }
});

verifyOtpForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    message.textContent = '';
    const otp = document.getElementById('otp').value.trim();
    if (!otp) return;

    try {
        const res = await fetch('/api/verify-otp', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: currentEmail, otp, csrf_token: csrfToken })
        });
        const data = await res.json();
        if (data.success) {
            verifyOtpForm.style.display = 'none';
            updatePasswordForm.style.display = 'block';
            message.style.color = 'green';
            message.textContent = 'OTP verified. Set a new password.';
        } else {
            message.style.color = 'red';
            message.textContent = data.error || 'Invalid OTP';
        }
    } catch (err) {
        message.style.color = 'red';
        message.textContent = 'Server error';
    }
});

updatePasswordForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    message.textContent = '';
    const newPassword = document.getElementById('newPassword').value.trim();
    if (!newPassword) return;

    try {
        const res = await fetch('/api/update-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: currentEmail, newPassword, csrf_token: csrfToken })
        });
        const data = await res.json();
        if (data.success) {
            message.style.color = 'green';
            message.textContent = 'Password reset successfully. Please login again';
            updatePasswordForm.style.display = 'none';
            setTimeout(() => {
                window.location.href = '/login.html';
            }, 1200);
        } else {
            message.style.color = 'red';
            message.textContent = data.error || 'Failed to reset password';
        }
    } catch (err) {
        message.style.color = 'red';
        message.textContent = 'Server error';
    }
});
</script>
</body>
</html>
