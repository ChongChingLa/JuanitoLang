<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <nav class="navigationBar">
    <ul class="nav-menu">
        <li class="dropdown">
            <button class="dropdown-btn">
                Expenses <span class="dropdown-arrow">▼</span>
            </button>
            <ul class="dropdown-content">
                <li><a href="expenses.html">View Expenses</a></li>
                <li><a href="expenses-history.html">Expenses History</a></li>
            </ul>
        </li>
        <li class="dropdown">
            <button class="dropdown-btn">
                Credits <span class="dropdown-arrow">▼</span>
            </button>
            <ul class="dropdown-content">
                <li><a href="credits.html">View Credits</a></li>
                <li><a href="credits-history.html">Credits History</a></li>
            </ul>
        </li>
    </ul>
    <div class="nav-right">
    <div id="greeting">Hello,&nbsp;<span id="userName"></span></div>
    <button id="logoutBtn">Logout</button>
    </div>
    </nav>

    <div class="stats-panel">
        <span id="totalPaid">Total Paid: 0</span>
        <span id="pending">Pending: 0</span>
        <span id="overdue">Overdue: 0</span>
    </div>

    <h1 style="text-align:center; margin-top:20px;">Expense Tracker</h1>
    <div class="table-container">   
        <div class="table-scroll">
            <table id="expenseTable">
                <tr>
                    <th>Due Date</th>
                    <th>Description</th>
                    <th>Category</th>
                    <th>Amount</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </table>
        </div>
    </div>
    <button id="addExpenseBtn">Add Expense</button>
    <div id="expenseModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle" style="text-align: center;">Add Expense</h3>
            <input type="hidden" id="expenseId">
            <label for="date">Due Date</label>
            <input type="date" id="date">
            <label for="description">Description</label>
            <input type="text" id="description" placeholder="Description">
            <label for="category">Category</label>
            <input type="text" id="category" placeholder="Category">
            <label for="amount">Amount</label>
            <input type="number" id="amount" placeholder="Amount">
            <div class="modal-actions">
                <button id="saveExpense">Save</button>
                <button id="closeModal">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // Prevent loading in an iframe
        if (window.top !== window.self) {
        alert("Clickjacking detected!");
        window.top.location =
        window.location;
        }

        const modal = document.getElementById("expenseModal");
        const addBtn = document.getElementById("addExpenseBtn");
        const closeBtn = document.getElementById("closeModal");
        const saveBtn = document.getElementById("saveExpense");

        //Navigation Bar drop-down options
        document.querySelectorAll('.dropdown-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const dropdown = btn.nextElementSibling;
                const isVisible = dropdown.style.display === 'block';
                // Close all dropdowns
                document.querySelectorAll('.dropdown-content').forEach(d => d.style.display = 'none');
                // Toggle current
                dropdown.style.display = isVisible ? 'none' : 'block';
            });
        });
        fetch('/api/user', { credentials: 'include' })
            .then(res => {
                if (!res.ok) throw new Error('Not logged in');
                return res.json();
            })
            .then(data => {
                document.getElementById('userName').textContent = data.name;
            })
            .catch(err => {
                console.error(err);
                document.getElementById('userName').textContent = '';
            });

        document.addEventListener('click', () => {
        document.querySelectorAll('.dropdown-content').forEach(d => d.style.display = 'none');
        });
        function getDueStatus(expenseDateStr) {
            if (!expenseDateStr) return "Unknown";
            const expenseDate = new Date(expenseDateStr);
            const today = new Date();
            expenseDate.setHours(0, 0, 0, 0);
            today.setHours(0, 0, 0, 0);
            return expenseDate > today ? "Unpaid" : "Overdue";
        }

        addBtn.addEventListener("click", () => {
            modal.style.display = "block";
            document.getElementById("modalTitle").textContent = "Add Expense";
        });

        closeBtn.addEventListener("click", () => {
            modal.style.display = "none";
            document.getElementById("expenseId").value = "";
            document.getElementById("date").value = "";
            document.getElementById("description").value = "";
            document.getElementById("category").value = "";
            document.getElementById("amount").value = "";
        });

        modal.addEventListener("click", (e) => {
            if (e.target === modal) modal.style.display = "none";
        });

        async function loadExpenses() {
            try {
                const response = await fetch('/api/expenses', { credentials: 'include' });
                if (response.status === 401) {
                    alert("Session expired. Please log in again.");
                    window.location.href = 'login.html';
                    return;
                }
                if (!response.ok) throw new Error('Failed to load expenses');
                const data = await response.json();
                const table = document.getElementById('expenseTable');
                while (table.rows.length > 1) table.deleteRow(1);

                data.sort((a, b) => new Date(a.date) - new Date(b.date));

                data.forEach(expense => {
                    const row = table.insertRow();
                    row.dataset.id = expense.expensesID;

                    row.insertCell(0).innerText = new Date(expense.date).toLocaleDateString();
                    row.insertCell(1).innerText = expense.description;
                    row.insertCell(2).innerText = expense.category;
                    row.insertCell(3).innerText = expense.amount.toLocaleString() + "₱";
                    row.insertCell(4).innerText = getDueStatus(expense.date);

                const actionCell = row.insertCell(5);
 
            // EDIT BUTTON

            const editBtn = document.createElement('button');
            editBtn.innerText = "Edit";
            editBtn.style.marginRight = "8px";
            editBtn.addEventListener('click', () => {
                document.getElementById("modalTitle").textContent = "Edit Expense";
                document.getElementById("expenseId").value = expense.expensesID;
                document.getElementById("date").value = expense.date.split('T')[0];
                document.getElementById("description").value = expense.description;
                document.getElementById("category").value = expense.category;
                document.getElementById("amount").value = expense.amount;
                modal.style.display = "block";
            });
            actionCell.appendChild(editBtn);

            // PAID BUTTON

            const paidBtn = document.createElement('button');
            paidBtn.innerText = "Paid";
            paidBtn.style.marginRight = "5px";
            paidBtn.addEventListener('click', async () => {
                if (!confirm("Are you sure you want to mark this expense as paid?")) return;
                const response = await fetch(`/api/expenses/${row.dataset.id}/paid`, { method: 'PUT', credentials: 'include' });
                if (!response.ok) { alert("Failed to mark as paid"); return; }
                row.remove();
            });
            actionCell.appendChild(paidBtn);

            // DELETE BUTTON
            
            const delBtn = document.createElement('button');
            delBtn.innerText = "Delete";
            delBtn.style.marginLeft = "5px";
            delBtn.addEventListener('click', async () => {
                if (!confirm("Are you sure you want to delete this expense?")) return;
                const response = await fetch(`/api/expenses/${row.dataset.id}`, { method: 'DELETE', credentials: 'include' });
                if (response.ok) row.remove();
                else alert("Failed to delete expense");
            });
            actionCell.appendChild(delBtn);
                });
            
            loadStats();

            } catch (err) {
                console.error(err);
                alert("Could not load expenses. Check if you're logged in.");
            }
        }

        window.addEventListener('load', loadExpenses);

        saveBtn.addEventListener("click", async () => {
            const expenseId = document.getElementById("expenseId").value;
            const isEdit = !!expenseId;
            const dateVal = document.getElementById("date").value.trim();
            const desc = document.getElementById("description").value.trim();
            const cat = document.getElementById("category").value.trim();
            const amt = parseFloat(document.getElementById("amount").value) || 0;

            if (!dateVal || !desc || !cat || amt <= 0) {
                alert("Fill all fields correctly");
                return;
            }

            const expenseData = { date: dateVal, description: desc, category: cat, amount: amt };
            const url = isEdit ? `/api/expenses/${expenseId}` : '/api/expenses';
            const method = isEdit ? 'PUT' : 'POST';

            try {
                const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(expenseData), credentials: 'include' });
                if (!res.ok) throw new Error("Failed to save expense");
                const data = await res.json();
                loadExpenses();
                modal.style.display = "none";
                document.getElementById("expenseId").value = "";
                document.getElementById("date").value = "";
                document.getElementById("description").value = "";
                document.getElementById("category").value = "";
                document.getElementById("amount").value = "";
            } catch (err) {
                console.error(err);
                alert("Failed to save expense");
            }
        });

        document.querySelector('#logoutBtn').addEventListener('click', async () => {
            await fetch('/logout', { method: 'POST', credentials: 'include' });
            window.location.href = 'login.html';
        });
        async function loadStats() {
            const [unpaidRes, paidRes] = await Promise.all([
                fetch('/api/expenses', { credentials: 'include' }),
                fetch('/api/expenses/paid', { credentials: 'include' })
            ]);
            const unpaid = await unpaidRes.json();
            const paid = await paidRes.json();

            const totalPaid = paid.length;
            const totalPending = unpaid.filter(e => getDueStatus(e.date) === "Unpaid").length;
            const totalOverdue = unpaid.filter(e => getDueStatus(e.date) === "Overdue").length;

            document.getElementById("totalPaid").innerText = "Total Paid: " + totalPaid;
            document.getElementById("pending").innerText = "Pending: " + totalPending;
            document.getElementById("overdue").innerText = "Overdue: " + totalOverdue;
        }

        loadStats();
    </script>
</body>
</html>
