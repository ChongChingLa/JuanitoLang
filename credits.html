<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credits Tracker</title>
<link rel="stylesheet" href="main.css">
</head>
<body>
<nav class="navigationBar">
    <ul class="nav-menu">
        <li class="dropdown">
            <button class="dropdown-btn">Expenses <span class="dropdown-arrow">▼</span></button>
            <ul class="dropdown-content">
                <li><a href="expenses.html">View Expenses</a></li>
                <li><a href="expenses-history.html">Expenses History</a></li>
            </ul>
        </li>
        <li class="dropdown">
            <button class="dropdown-btn">Credits <span class="dropdown-arrow">▼</span></button>
            <ul class="dropdown-content">
                <li><a href="credits.html">View Credits</a></li>
                <li><a href="credits-history.html">Credits History</a></li>
            </ul>
        </li>
    </ul>
    <div class="nav-right">
    <div id="greeting">Hello,&nbsp;<span id="userName"></span></div>
    <button id="logoutBtn">Logout</button>
    </div>
</nav>

<div class="stats-panel">
    <span id="totalPaid">Total Credit Paid: 0₱</span>
    <span id="pending">Pending Credit: 0₱</span>
    <span id="overdue">Overdue: 0₱</span>
</div>

<h1 style="text-align:center; margin-top:20px;">Credits Tracker</h1>

<div class="table-container">
    <div class="table-scroll">
        <table id="expenseTable">
            <tr>
                <th>Customer</th>
                <th>Description</th>
                <th>Amount</th>
                <th>Due Date</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </table>
    </div>
</div>

<button id="addExpenseBtn">Add Credit</button>

<!-- ADD/EDIT MODAL -->
<div id="expenseModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle" style="text-align: center;">Add Credit</h3>
        <input type="hidden" id="expenseId">
        <label for="customerName">Customer Name</label>
        <input type="text" id="customerName" placeholder="Customer Name">
        <label for="description">Description</label>
        <input type="text" id="description" placeholder="Description">
        <label for="originalAmount">Amount</label>
        <input type="number" id="originalAmount" placeholder="Amount">
        <label for="dueDate">Due Date</label>
        <input type="date" id="dueDate">
        <div class="modal-actions">
            <button id="saveExpense">Save</button>
            <button id="closeModal">Cancel</button>
        </div>
    </div>
</div>

<!-- PAY MODAL -->
<div id="payModal" class="modal">
    <div class="modal-content">
        <h3 id="payModalTitle" style="text-align: center;">Pay Credit</h3>
        <input type="hidden" id="payCreditId">
        <p id="payCreditInfo" style="margin-bottom: 10px;"></p>
        <div style="display:flex; flex-direction:column;">
            <label style="display:flex; align-items:center; gap:5px; margin-bottom:20px;">
                Full Payment <input type="radio" name="payOption" value="full" checked>
            </label>
            <label style="display:flex; align-items:center; gap:5px;">
                Partial Payment <input type="radio" name="payOption" value="partial">
            </label>
        </div>
        <input type="number" id="partialAmount" placeholder="Enter amount" style="display:none; margin-top:5px;">
        <div class="modal-actions" style="margin-top:10px;">
            <button id="confirmPay">Confirm</button>
            <button id="cancelPay">Cancel</button>
        </div>
    </div>
</div>

<script>
// Prevent loading in an iframe
if (window.top !== window.self) {
alert("Clickjacking detected!");
window.top.location =
window.location;
}

const modal = document.getElementById("expenseModal");
const addBtn = document.getElementById("addExpenseBtn");
const closeBtn = document.getElementById("closeModal");
const saveBtn = document.getElementById("saveExpense");

const payModal = document.getElementById("payModal");
const payCreditInfo = document.getElementById("payCreditInfo");
const payCreditId = document.getElementById("payCreditId");
const partialAmountInput = document.getElementById("partialAmount");
const confirmPayBtn = document.getElementById("confirmPay");
const cancelPayBtn = document.getElementById("cancelPay");

// Dropdown
document.querySelectorAll('.dropdown-btn').forEach(btn => {
    btn.addEventListener('click', e => {
        e.stopPropagation();
        const dropdown = btn.nextElementSibling;
        const isVisible = dropdown.style.display === 'block';
        document.querySelectorAll('.dropdown-content').forEach(d => d.style.display = 'none');
        dropdown.style.display = isVisible ? 'none' : 'block';
    });
});
fetch('/api/user', { credentials: 'include' })
        .then(res => {
        if (!res.ok) throw new Error('Not logged in');
        return res.json();
    })
    .then(data => {
        document.getElementById('userName').textContent = data.name;
    })
    .catch(err => {
        console.error(err);
        document.getElementById('userName').textContent = '';
    });

document.addEventListener('click', () => document.querySelectorAll('.dropdown-content').forEach(d => d.style.display = 'none'));

// Modals
addBtn.addEventListener("click", () => {
    modal.style.display = "block";
    document.getElementById("modalTitle").textContent = "Add Credit";
    resetModal();
});
closeBtn.addEventListener("click", () => { modal.style.display = "none"; resetModal(); });
modal.addEventListener("click", e => { if(e.target === modal) closeBtn.click(); });
payModal.addEventListener("click", e => { if(e.target === payModal) cancelPayBtn.click(); });

function resetModal() {
    document.getElementById("expenseId").value = "";
    document.getElementById("customerName").value = "";
    document.getElementById("description").value = "";
    document.getElementById("originalAmount").value = "";
    document.getElementById("dueDate").value = "";
}

function calculateStatus(dueDateStr) {
    const dueDate = new Date(dueDateStr);
    const today = new Date();
    dueDate.setHours(0,0,0,0);
    today.setHours(0,0,0,0);
    return dueDate >= today ? "Pending" : "Overdue";
}

async function loadCredits() {
    try {
        const res = await fetch('/api/credits', { credentials: 'include' });
        if(!res.ok) throw new Error('Failed to load credits');
        const data = await res.json();

        const table = document.getElementById('expenseTable');
        while(table.rows.length > 1) table.deleteRow(1);

        data
          .filter(c => c.status !== "Paid")  // only pending/overdue
          .sort((a,b) => new Date(a.dueDate) - new Date(b.dueDate))
          .forEach(credit => {
              const row = table.insertRow();
              row.dataset.id = credit.creditID;

              row.insertCell(0).innerText = credit.customerName;
              row.insertCell(1).innerText = credit.description;
              row.insertCell(2).innerText = parseFloat(credit.remainingAmount).toLocaleString() + "₱";

              const dueCell = row.insertCell(3);
              dueCell.innerText = new Date(credit.dueDate).toLocaleDateString();
              dueCell.dataset.raw = credit.dueDate;

              row.insertCell(4).innerText = credit.status;

              const actionCell = row.insertCell(5);

              const editBtn = document.createElement('button');
              editBtn.innerText = "Edit";
              editBtn.style.marginRight = "5px";
              editBtn.addEventListener('click', () => {
                  document.getElementById("modalTitle").textContent = "Edit Credit";
                  document.getElementById("expenseId").value = credit.creditID;
                  document.getElementById("customerName").value = credit.customerName;
                  document.getElementById("description").value = credit.description;
                  document.getElementById("originalAmount").value = credit.originalAmount;
                  document.getElementById("dueDate").value = credit.dueDate.split('T')[0];
                  modal.style.display = "block";
              });
              actionCell.appendChild(editBtn);

              const payBtn = document.createElement('button');
              payBtn.innerText = "Pay";
              payBtn.style.marginRight = "5px";
              payBtn.addEventListener('click', () => openPayModal(credit));
              actionCell.appendChild(payBtn);

              const delBtn = document.createElement('button');
              delBtn.innerText = "Delete";
              delBtn.style.marginLeft = "5px";
              delBtn.addEventListener('click', async () => {
                  if(!confirm("Are you sure you want to delete this credit?")) return;
                  const resp = await fetch(`/api/credits/${row.dataset.id}`, { method:'DELETE', credentials:'include' });
                  if(resp.ok) row.remove();
                  else alert("Failed to delete credit");
              });
              actionCell.appendChild(delBtn);
          });

        loadStats(data);
    } catch(err) {
        console.error(err);
        alert("Failed to load credits");
    }
}

// Pay Modal
function openPayModal(credit) {
    payCreditId.value = credit.creditID;
    payCreditInfo.innerText = `Customer Name: ${credit.customerName} | Remaining: ${parseFloat(credit.remainingAmount).toLocaleString()}₱`;
    partialAmountInput.style.display = "none";
    partialAmountInput.value = "";
    payModal.style.display = "block";

    document.querySelectorAll('input[name="payOption"]').forEach(r => {
        r.checked = r.value === "full";
        r.addEventListener('change', () => partialAmountInput.style.display = r.value==="partial"?"block":"none");
    });
}

cancelPayBtn.addEventListener('click', () => payModal.style.display = "none");

confirmPayBtn.addEventListener('click', async () => {
    const id = parseInt(payCreditId.value,10);
    if(isNaN(id)) { alert("Invalid credit ID"); return; }

    const row = Array.from(document.getElementById('expenseTable').rows)
                .find(r => parseInt(r.dataset.id,10)===id);
    if(!row) { alert("Credit row not found"); return; }

    const isPartial = document.querySelector('input[name="payOption"]:checked').value==="partial";
    let amountPaid = 0;
    const remaining = parseFloat(row.cells[2].innerText.replace(/₱|,/g,''));
    if(isPartial){
        amountPaid = parseFloat(partialAmountInput.value);
        if(isNaN(amountPaid) || amountPaid<=0){ alert("Enter valid amount"); return; }
        if(amountPaid>remaining){ alert("Amount exceeds remaining credit"); return; }
    } else amountPaid = remaining;

    if(!confirm(`Confirm payment of ${amountPaid.toLocaleString()}₱ for ${row.cells[0].innerText}?`)) return;

    const newRemaining = remaining - amountPaid;
    const dueDateISO = row.cells[3].dataset.raw;
    const newStatus = newRemaining===0?"Paid":calculateStatus(dueDateISO);
    const paidDate = newRemaining===0?new Date().toISOString():null;

    try {
        const res = await fetch(`/api/credits/${id}`,{
            method:'PUT',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({remainingAmount:newRemaining,status:newStatus,paidDate}),
            credentials:'include'
        });
        if(!res.ok) throw new Error("Failed to update credit");
        payModal.style.display="none";
        await loadCredits();
    } catch(err){
        console.error(err);
        alert("Failed to update credit");
    }
});

// Save Credit
saveBtn.addEventListener("click", async ()=>{
    const creditId = document.getElementById("expenseId").value;
    const isEdit = !!creditId;
    const customerName = document.getElementById("customerName").value.trim();
    const description = document.getElementById("description").value.trim();
    const originalAmount = parseFloat(document.getElementById("originalAmount").value) || 0;
    const dueDate = document.getElementById("dueDate").value;

    if(!customerName.match(/^[A-Za-z\s]+$/)){ alert("Name cannot contain numbers"); return; }
    if(!customerName || !description || originalAmount<=0 || !dueDate){ alert("Fill all fields correctly"); return; }

    const status = calculateStatus(dueDate);
    const payload = {customerName,description,originalAmount,remainingAmount:originalAmount,dateBorrowed:new Date().toISOString(),dueDate,status};

    try {
        const res = await fetch(isEdit?`/api/credits/${creditId}`:'/api/credits',{
            method:isEdit?'PUT':'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify(payload),
            credentials:'include'
        });
        if(!res.ok) throw new Error("Failed to save credit");
        await loadCredits();
        resetModal();
        modal.style.display="none";
    } catch(err){
        console.error(err);
        alert("Failed to save credit");
    }
});

function loadStats(data) {
    let totalPaid = 0, pending = 0, overdue = 0;

    data.forEach(c => {
        if (c.status === "Paid") totalPaid++;
        else if (c.status === "Pending") pending++;
        else if (c.status === "Overdue") overdue++;
    });

    document.getElementById("totalPaid").innerText = `Total Credit Paid: ${totalPaid}`;
    document.getElementById("pending").innerText = `Pending: ${pending}`;
    document.getElementById("overdue").innerText = `Overdue: ${overdue}`;
}

// Load
window.addEventListener('load',loadCredits);

// Logout
document.getElementById('logoutBtn').addEventListener('click', async ()=>{
    await fetch('/logout',{method:'POST',credentials:'include'});
    window.location.href='login.html';
});
</script>
</body>
</html>
